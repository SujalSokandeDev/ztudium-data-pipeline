name: Daily Content Opportunities

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:
  workflow_run:
    workflows:
      - Daily Google Fetch (GSC + GA4)
      - Process Ahrefs CSVs
      - Process Keyword Gap CSVs
    types:
      - completed

permissions:
  contents: read

jobs:
  generate-daily-content-opportunities:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily content opportunities
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ARVOW_API_KEY: ${{ secrets.ARVOW_API_KEY }}
          ARVOW_INTEGRATION_ID_CITIESABC: ${{ secrets.ARVOW_INTEGRATION_ID_CITIESABC }}
          ARVOW_INTEGRATION_ID_BUSINESSABC: ${{ secrets.ARVOW_INTEGRATION_ID_BUSINESSABC }}
          ARVOW_INTEGRATION_ID_HEDGETHINK: ${{ secrets.ARVOW_INTEGRATION_ID_HEDGETHINK }}
          ARVOW_INTEGRATION_ID_FASHIONABC: ${{ secrets.ARVOW_INTEGRATION_ID_FASHIONABC }}
          ARVOW_INTEGRATION_ID_TRADERSDNA: ${{ secrets.ARVOW_INTEGRATION_ID_TRADERSDNA }}
          ARVOW_INTEGRATION_ID_FREEDOMX: ${{ secrets.ARVOW_INTEGRATION_ID_FREEDOMX }}
          ARVOW_INTEGRATION_ID_WISDOMIA: ${{ secrets.ARVOW_INTEGRATION_ID_WISDOMIA }}
          ARVOW_INTEGRATION_ID_SPORTSDNA: ${{ secrets.ARVOW_INTEGRATION_ID_SPORTSDNA }}
          ARVOW_INTEGRATION_ID_INTELLIGENTHQ: ${{ secrets.ARVOW_INTEGRATION_ID_INTELLIGENTHQ }}
        run: python scripts/generate_daily_content_opportunities.py
