name: Process Internal Linking Suggestions

on:
  workflow_dispatch:
    inputs:
      date_folder:
        description: 'Date folder in Supabase Storage (YYYY-MM-DD). Blank = today.'
        required: false
        default: ''
      bypass_layer2:
        description: 'Skip AI validation layer 2 (faster, lower precision)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      debug_payload:
        description: 'Log full AI request/response payloads'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  process-internal-linking:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine date folder
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date_folder }}" ]; then
            echo "folder=${{ github.event.inputs.date_folder }}" >> $GITHUB_OUTPUT
          else
            echo "folder=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Rebuild internal linking suggestions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INTERNAL_LINKING_BYPASS_LAYER2: ${{ github.event.inputs.bypass_layer2 == 'true' && '1' || '' }}
          INTERNAL_LINKING_DEBUG_PAYLOAD: ${{ github.event.inputs.debug_payload == 'true' && '1' || '' }}
        run: python scripts/process_ahrefs.py --date-folder ${{ steps.date.outputs.folder }} --internal-linking-only
