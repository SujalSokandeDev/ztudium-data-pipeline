name: Process Internal Linking Suggestions

on:
  workflow_dispatch:
    inputs:
      date_folder:
        description: 'Date folder in Supabase Storage (YYYY-MM-DD)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  process-internal-linking:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine date folder
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date_folder }}" ]; then
            echo "folder=${{ github.event.inputs.date_folder }}" >> $GITHUB_OUTPUT
          else
            echo "folder=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Rebuild internal linking suggestions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INTERNAL_LINKING_BYPASS_LAYER2: "1"
          INTERNAL_LINKING_DEBUG_PAYLOAD: "1"
        run: python scripts/process_ahrefs.py --date-folder ${{ steps.date.outputs.folder }} --internal-linking-only
